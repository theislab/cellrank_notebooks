[tool.ruff]
src = ["tutorials"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"tutorials/**/*.ipynb" = [
    "E402",   # imports not at top (common in notebooks)
    "F401",   # unused imports (tutorial notebooks show imports for demonstration)
]

[tool.ruff.format]
docstring-code-format = true
